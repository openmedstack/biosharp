name: CI

on: [ push ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Get the sources
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Build BioSharp
        run: dotnet build openmedstack-biosharp.sln -c Release
      - name: Test BioSharp
        run: dotnet test openmedstack-biosharp.sln -c Release
